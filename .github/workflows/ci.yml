name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .[dev]
          python -m pip check

      - name: Compile package
        run: python -m py_compile app.py ai_nutritionist/*.py ai_nutritionist/ui/*.py

      - name: Run lint
        run: ruff check .

      - name: Run type check
        run: mypy ai_nutritionist

      - name: Run tests
        run: pytest -q

      - name: Run API import smoke check
        run: python -c "from ai_nutritionist.api import create_app; app = create_app(); print(app.title)"

      - name: Run evaluation smoke check
        run: python -m ai_nutritionist.evaluation

      - name: Run daily Mediterranean CLI smoke check
        run: >
          ai-nutritionist
          --weight 75
          --height 180
          --age 30
          --sex male
          --activity moderate
          --dietary-pattern mediterranean
          --weight-goal lose
          --top-k 3

      - name: Run weekly Mediterranean CLI smoke check
        run: >
          ai-nutritionist
          --weight 125
          --height 200
          --age 30
          --sex male
          --activity moderate
          --dietary-pattern mediterranean
          --weight-goal lose
          --weekly
          --top-k 3

      - name: Check for forbidden artifact files and secret patterns
        shell: bash
        run: |
          forbidden_artifact_paths="$(git ls-files | grep -E '(^|/)(__pycache__|\.pytest_cache|\.ruff_cache|\.mypy_cache|\.idea|\.local)(/|$)|(^|/)data/raw(/|$)|(\.env($|\.)|\.pem$|\.key$|\.p12$|\.pfx$|\.pdf$|\.zip$)' || true)"
          if [ -n "$forbidden_artifact_paths" ]; then
            echo "forbidden artifact files or directories found:"
            echo "$forbidden_artifact_paths"
            exit 1
          fi
          if git grep -nE 'AKIA[0-9A-Z]{16}|gh[pousr]_[A-Za-z0-9_]{20,}|-----BEGIN (RSA |OPENSSH |EC |DSA )?PRIVATE KEY-----|xox[baprs]-[A-Za-z0-9-]+' -- .; then
            echo "possible secret pattern found"
            exit 1
          fi

  docker-runtime:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t ai-nutritionist:ci .

      - name: Start Docker container
        run: docker run --rm -d --name ai-nutritionist-ci -p 8501:8501 ai-nutritionist:ci

      - name: Wait for Streamlit health endpoint
        shell: bash
        run: |
          for attempt in {1..60}; do
            if python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=3).read()" >/dev/null 2>&1; then
              echo "Streamlit health endpoint is ready"
              exit 0
            fi
            sleep 2
          done
          docker logs ai-nutritionist-ci
          exit 1

      - name: Show Docker logs on failure
        if: failure()
        run: docker logs ai-nutritionist-ci || true

      - name: Stop Docker container
        if: always()
        run: docker stop ai-nutritionist-ci || true
